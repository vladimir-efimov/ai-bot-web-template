<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт Вашего заказчика</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Сайт Вашего заказчика</h1>
        <button class="icon-button" id="openChat">💬</button>
    </div>

    <!-- Всплывающее окно чата -->
    <div class="chat-overlay" id="chatOverlay">
        <div class="chat-window">
            <div class="chat-header">
                <span>Чат-бот</span>
                <button class="close-button" id="closeChat">×</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <!-- Сообщения будут добавляться здесь -->
            </div>
            <div class="chat-buttons" id="chatButtons">
                <!-- Кнопки будут добавляться здесь -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
